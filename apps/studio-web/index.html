<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ImGui Studio — Phase 2</title>
    <link rel="stylesheet" href="/styles.css" />
    <script nonce="__STUDIO_CSP_NONCE__">
      globalThis.__studioBootstrap = { token: '__STUDIO_SESSION_TOKEN__' };
    </script>
    <script src="/vendor/monaco/vs/loader.js"></script>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">IMGUI STUDIO</p>
          <h1 id="project-name">Loading project…</h1>
        </div>
        <div class="status-group">
          <span id="revision-status" class="status">Revision —</span>
          <span id="preview-status" class="status status-loading">No preview</span>
          <button id="save-button" type="button" disabled>Save</button>
          <button id="build-button" type="button" disabled>Build preview</button>
        </div>
      </header>

      <section class="workspace" aria-label="Phase 2 edit and preview workspace">
        <aside class="project-panel">
          <div class="panel-heading">
            <span>PROJECT</span>
            <span id="stale-indicator" class="stale-indicator" hidden>PREVIEW STALE</span>
          </div>
          <nav id="project-tree" aria-label="Project files"></nav>
        </aside>

        <section class="editor-panel" aria-label="C++ source editor">
          <div class="editor-heading">
            <span id="active-path">Select a file</span>
            <span id="editor-state">Clean</span>
          </div>
          <div id="editor" aria-label="Monaco C++ editor"></div>
          <section class="build-output" aria-live="polite">
            <div class="build-summary">
              <strong id="build-status">Build has not run.</strong>
              <span id="build-timing"></span>
            </div>
            <ol id="diagnostics"></ol>
          </section>
        </section>

        <section class="preview-panel" aria-label="Real Dear ImGui preview">
          <div class="preview-heading">
            <span>WEBASSEMBLY / WEBGL2</span>
            <output id="geometry-value">Waiting for preview</output>
          </div>
          <div class="preview-frame">
            <iframe
              id="preview"
              title="Sandboxed Dear ImGui WebAssembly preview"
              src="about:blank"
              sandbox="allow-scripts allow-same-origin"
              width="900"
              height="600"
            ></iframe>
            <div id="preview-empty" class="preview-empty">
              <strong>No successful build yet</strong>
              <span>Build the project to load the first immutable preview.</span>
            </div>
          </div>
        </section>
      </section>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
