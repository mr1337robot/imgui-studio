<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; frame-src http://127.0.0.1:4174; connect-src 'self'; img-src 'self' data:; base-uri 'none'; form-action 'none'"
    />
    <title>ImGui Studio — Phase 1</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">IMGUI STUDIO</p>
          <h1>Real C++ preview</h1>
        </div>
        <div class="status-group">
          <span id="preview-status" class="status status-loading">Connecting</span>
          <button id="capture-button" type="button" disabled>Capture framebuffer</button>
        </div>
      </header>

      <section class="workspace" aria-label="Phase 1 preview workspace">
        <aside class="rail">
          <h2>Rendering spine</h2>
          <dl>
            <div>
              <dt>Source</dt>
              <dd>Shared C++20</dd>
            </div>
            <div>
              <dt>Renderer</dt>
              <dd id="renderer-value">Waiting</dd>
            </div>
            <div>
              <dt>Viewport</dt>
              <dd>900 × 600</dd>
            </div>
            <div>
              <dt>Protocol</dt>
              <dd>v1</dd>
            </div>
          </dl>
          <div class="geometry">
            <h3>Toggle geometry</h3>
            <output id="geometry-value">Waiting for first frame…</output>
          </div>
          <p id="capture-status" class="capture-status">No capture saved.</p>
        </aside>

        <div class="preview-frame">
          <iframe
            id="preview"
            title="Sandboxed Dear ImGui WebAssembly preview"
            src="http://127.0.0.1:4174/preview.html?parentOrigin=http://127.0.0.1:4173"
            sandbox="allow-scripts allow-same-origin"
            width="900"
            height="600"
          ></iframe>
        </div>
      </section>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
