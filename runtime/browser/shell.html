<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; font-src 'self'; base-uri 'none'; form-action 'none'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ImGui Studio Preview</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #080b16;
      }

      #canvas {
        display: block;
        width: 900px;
        height: 600px;
        outline: none;
      }

      #status {
        position: fixed;
        inset: 12px auto auto 12px;
        z-index: 2;
        padding: 6px 9px;
        border: 1px solid rgb(255 72 243 / 35%);
        border-radius: 6px;
        background: rgb(10 12 24 / 80%);
        color: #d9d7ee;
        font:
          12px/1.2 system-ui,
          sans-serif;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="status" role="status">Loading real Dear ImGui…</div>
    <canvas
      id="canvas"
      width="900"
      height="600"
      tabindex="0"
      aria-label="Dear ImGui preview"
    ></canvas>
    <script>
      (() => {
        // The parent origin is supplied by the trusted shell URL, then restricted to the one
        // loopback port used by Phase 1. It is never copied blindly into postMessage targets.
        const parameters = new URLSearchParams(window.location.search);
        const parentOrigin = parameters.get('parentOrigin');
        if (!/^http:\/\/(?:127\.0\.0\.1|localhost):[1-9][0-9]{0,4}$/.test(parentOrigin ?? '')) {
          document.getElementById('status').textContent = 'Invalid parent origin';
          throw new Error('Preview requires the configured Studio loopback origin.');
        }
        window.__studioParentOrigin = parentOrigin;
        // Phase 2 supplies immutable build/revision identity through the service-generated iframe
        // URL. Phase 1 standalone tooling omits it and receives explicit fixture identities.
        window.__studioIdentity = {
          projectId: parameters.get('projectId') ?? 'prj_phase1_fixture',
          projectRevision: parameters.get('projectRevision') ?? '0',
          buildId: parameters.get('buildId') ?? 'bld_phase1_fixture',
          previewInstanceId: parameters.get('previewInstanceId') ?? 'prv_phase1_fixture',
        };
        window.__studioDeterministicTimeUs = null;
        window.__studioPlaybackSpeed = 1;
        window.__studioResetRequested = false;
        window.addEventListener('message', (event) => {
          if (event.origin !== window.__studioParentOrigin) return;
          const command = event.data;
          if (command?.type === 'studio.runtime.reset') {
            window.__studioResetRequested = true;
            window.__studioDeterministicTimeUs = 0;
          } else if (
            command?.type === 'studio.runtime.render' &&
            Number.isSafeInteger(command.timeUs)
          ) {
            window.__studioDeterministicTimeUs = command.timeUs;
          } else if (command?.type === 'studio.runtime.play') {
            window.__studioDeterministicTimeUs = null;
          } else if (
            command?.type === 'studio.runtime.speed' &&
            Number.isFinite(command.speed) &&
            command.speed >= 0 &&
            command.speed <= 16
          ) {
            window.__studioPlaybackSpeed = command.speed;
          }
        });
        window.__studioLastFrame = null;
        window.__studioCaptureRequest = null;

        window.addEventListener('message', (event) => {
          // A capture request is accepted only from this iframe's actual parent at the validated
          // origin. Version/type checks make stale or malformed protocol messages inert.
          if (event.source !== window.parent || event.origin !== window.__studioParentOrigin) {
            return;
          }
          const message = event.data;
          if (
            !message ||
            message.protocolVersion !== 1 ||
            message.type !== 'studio.capture.request' ||
            typeof message.requestId !== 'string'
          ) {
            return;
          }

          window.__studioCaptureRequest = { requestId: message.requestId };
        });

        window.Module = {
          // Emscripten reads this object during bootstrap. Supplying the existing canvas prevents
          // it from creating an untracked rendering surface outside the canonical 900 x 600 node.
          canvas: document.getElementById('canvas'),
          printErr(text) {
            console.error(text);
            const status = document.getElementById('status');
            if (status) {
              status.textContent = 'Preview error';
            }
          },
          onRuntimeInitialized() {
            const status = document.getElementById('status');
            if (status) {
              status.hidden = true;
            }
            window.Module.canvas.focus();
          },
        };
      })();
    </script>
    {{{ SCRIPT }}}
  </body>
</html>
