name: Foundation CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: foundation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-foundation:
    name: Windows native and Phase 2 service
    runs-on: windows-2025
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Configure Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.12.0
          cache: npm

      - name: Configure MSVC developer environment
        uses: ilammy/msvc-dev-cmd@a102174a2b586eec2ea151a69e6fd14404a8ce7c
        with:
          arch: x64

      - name: Install pinned host tools
        shell: pwsh
        run: |
          npm install --global npm@11.6.2
          python -m pip install --disable-pip-version-check cmake==4.3.2

      - name: Install npm dependencies
        run: npm ci

      - name: Install Chromium for service smoke and Studio tests
        run: npx playwright install chromium

      - name: Fetch and verify pinned Dear ImGui source
        shell: pwsh
        run: .\toolchain\bootstrap-dependencies.ps1

      - name: Run native quality gate
        run: npm run validate

      - name: Capture canonical and shifted native frames
        shell: pwsh
        run: |
          .\toolchain\capture-native.ps1
          .\toolchain\capture-native.ps1 -Output .\out\captures\native-shifted.png -Metadata .\out\captures\native-shifted.metadata.json -LayoutOffsetXPx 8

      - name: Install pinned Emscripten SDK
        shell: pwsh
        run: .\toolchain\bootstrap-emscripten.ps1

      - name: Run Phase 2 edit-build-preview gates
        shell: pwsh
        run: |
          . .\.tools\emsdk\emsdk_env.ps1
          npm run test:phase2
          npm run test:studio

      - name: Upload Phase 2 evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: phase2-edit-build-preview
          path: |
            out/phase2-integration/report.json
            out/phase2-studio-test/*.png
          if-no-files-found: error

      - name: Upload native parity captures
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: phase1-native-captures
          path: out/captures/native*
          if-no-files-found: error

  wasm-foundation:
    name: Emscripten foundation
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Configure Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.12.0
          cache: npm

      - name: Install pinned host tools
        run: |
          npm install --global npm@11.6.2
          python3 -m pip install --break-system-packages --disable-pip-version-check cmake==4.3.2
          npm ci
          npx playwright install --with-deps chromium

      - name: Install pinned Emscripten SDK
        shell: bash
        run: |
          git clone https://github.com/emscripten-core/emsdk.git .tools/emsdk
          git -C .tools/emsdk checkout --detach 62a853cd3b3134398ce85cde8bb5cbb2ef0194cb
          .tools/emsdk/emsdk install 4.0.10
          .tools/emsdk/emsdk activate 4.0.10

      - name: Verify and build the WASM foundation
        shell: bash
        run: |
          source .tools/emsdk/emsdk_env.sh
          node scripts/verify-toolchain.mjs --profile wasm
          emcmake cmake -S . -B build/wasm-preview -G Ninja -DIMGUI_STUDIO_BUILD_TESTS=ON
          cmake --build build/wasm-preview
          ctest --test-dir build/wasm-preview --output-on-failure
          npm run test:browser

      - name: Upload browser parity capture
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: phase1-browser-capture
          path: out/captures/browser.*
          if-no-files-found: error

  phase1-parity:
    name: Browser/native parity gate
    needs: [windows-foundation, wasm-foundation]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Configure Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.12.0
          cache: npm

      - name: Install pinned npm graph
        run: |
          npm install --global npm@11.6.2
          npm ci

      - name: Download browser capture
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53
        with:
          name: phase1-browser-capture
          path: out/captures

      - name: Download native captures
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53
        with:
          name: phase1-native-captures
          path: out/captures

      - name: Verify canonical and negative parity fixtures
        run: |
          npm run compare:captures
          node scripts/compare-captures.mjs --native-image out/captures/native-shifted.png --native-metadata out/captures/native-shifted.metadata.json --report out/comparison/phase1-shifted.report.json --difference out/comparison/phase1-shifted.difference.png --expect-failure

      - name: Upload parity reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: phase1-parity-reports
          path: out/comparison
          if-no-files-found: error
